<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGR Digital | Sistema de Auditoria JSS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #1e1b4b; /* Azul Escuro da Seleção */
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
        }

        .nav-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .q-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* ESTILO BOTÃO DE RESPOSTA */
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-item { position: relative; }
        .option-item input[type="radio"] { position: absolute; opacity: 0; }

        .option-label {
            display: block;
            padding: 18px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            background: #fff;
        }

        .option-label:hover { border-color: var(--primary); background: #f8faff; }

        /* Estado Selecionado (Azul Escuro) */
        .option-item input[type="radio"]:checked + .option-label {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            color: white;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 15px;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .stats-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: inline-block;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .risk-badge { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('admin')">Painel de Auditoria</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-weight: 800; color: var(--primary); margin-bottom: 5px;">Avaliação JSS</h1>
            <p style="color: var(--text-muted);">Sua participação é anônima e fundamental.</p>
        </div>

        <div class="q-card">
            <div class="input-group">
                <input type="text" id="cpf-input" placeholder="CPF (Apenas números)" maxlength="11">
                <select id="setor-select">
                    <option value="">Selecione seu Setor...</option>
                    <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                    <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                    <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                    <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                    <option value="TI">TI</option>
                    <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                    <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                    <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                    <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                    <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                    <option value="EVENTOS">EVENTOS</option>
                    <option value="ENFERMAGEM">ENFERMAGEM</option>
                    <option value="DIRETORIA">DIRETORIA</option>
                </select>
            </div>
        </div>

        <form id="form-pgr">
            <div id="container-questoes"></div>
            <button type="button" id="btn-enviar" onclick="enviarDados()" class="primary-btn">FINALIZAR E ENVIAR</button>
        </form>
    </section>

    <section id="screen-admin" class="screen">
        <div class="q-card" style="text-align: center;">
            <h2>Dashboard de Auditoria</h2>
            <button onclick="gerarRelatorio()" class="primary-btn" style="width: auto; padding: 12px 40px;">ATUALIZAR RELATÓRIO</button>
        </div>
        <div id="admin-content" class="q-card">
            <div id="interpretacao">Aguardando processamento de dados...</div>
            <div id="tabela-resultados"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Com que frequência você tem que fazer suas tarefas com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Com que frequência você tem que trabalhar intensamente?" },
        { id: 3, dim: "Demandas", txt: "Seu trabalho exige demais de você?" },
        { id: 4, dim: "Demandas", txt: "Você tem tempo suficiente para cumprir todas as tarefas?", inv: true },
        { id: 5, dim: "Demandas", txt: "O seu trabalho costuma apresentar exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Você tem possibilidade de aprender coisas novas em seu trabalho?" },
        { id: 7, dim: "Controle", txt: "Seu trabalho exige muita habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Seu trabalho exige que você tome iniciativas?" },
        { id: 9, dim: "Controle", txt: "No seu trabalho, você tem que repetir muitas vezes as mesmas tarefas?", inv: true },
        { id: 10, dim: "Controle", txt: "Você pode escolher COMO fazer o seu trabalho?" },
        { id: 11, dim: "Controle", txt: "Você pode escolher O QUE fazer no seu trabalho?" },
        { id: 12, dim: "Apoio", txt: "Existe um ambiente calmo e agradável onde trabalho?" },
        { id: 13, dim: "Apoio", txt: "No trabalho, nos relacionamos bem uns com os outros." },
        { id: 14, dim: "Apoio", txt: "Eu posso contar com o apoio dos meus colegas." },
        { id: 15, dim: "Apoio", txt: "Se eu não estiver num bom dia, meus colegas compreendem." },
        { id: 16, dim: "Apoio", txt: "No trabalho, eu me relaciono bem com meus chefes." },
        { id: 17, dim: "Apoio", txt: "Eu gosto de trabalhar com meus colegas." }
    ];

    // Gerar Perguntas
    const container = document.getElementById('container-questoes');
    perguntas.forEach(p => {
        const labels = p.id >= 12 ? ["Concordo Totalmente", "Concordo Parcialmente", "Discordo Parcialmente", "Discordo Totalmente"] : ["Frequentemente", "Às vezes", "Raramente", "Nunca"];
        const cor = p.dim === "Demandas" ? "#e0e7ff" : (p.dim === "Controle" ? "#d1fae5" : "#fef3c7");
        const txtC = p.dim === "Demandas" ? "#4338ca" : (p.dim === "Controle" ? "#065f46" : "#92400e");

        let options = labels.map((l, i) => `
            <div class="option-item">
                <input type="radio" name="q${p.id}" id="q${p.id}_${i}" value="${4-i}" required>
                <label for="q${p.id}_${i}" class="option-label">${l}</label>
            </div>
        `).join('');

        container.innerHTML += `
            <div class="q-card">
                <span class="stats-badge" style="background:${cor}; color:${txtC}">${p.dim}</span>
                <p style="font-weight: 700; margin-bottom: 20px;">${p.id}. ${p.txt}</p>
                <div class="options-container">${options}</div>
            </div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g, '');
        const setor = document.getElementById('setor-select').value;
        const respondidas = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor) return alert("CPF ou Setor inválidos.");
        if(respondidas.length < 17) return alert("Responda todas as perguntas.");

        // Trava por CPF
        const q = query(collection(db, "respostas_pgr"), where("cpf", "==", cpf));
        const check = await getDocs(q);
        if(!check.empty) return alert("Este CPF já enviou uma resposta.");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        respondidas.forEach(input => {
            const pId = parseInt(input.name.replace('q', ''));
            const p = perguntas.find(x => x.id === pId);
            let v = parseInt(input.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Avaliação enviada com sucesso!");
        location.reload();
    };

    function getMediana(arr) {
        if(!arr.length) return 0;
        const s = [...arr].sort((a,b) => a-b);
        const m = Math.floor(s.length/2);
        return s.length % 2 !== 0 ? s[m] : (s[m-1] + s[m])/2;
    }

    window.gerarRelatorio = async () => {
        const snap = await getDocs(collection(db, "respostas_pgr"));
        const dados = snap.docs.map(d => d.data());
        if(!dados.length) return alert("Nenhum dado no banco.");

        const medD = getMediana(dados.map(d => d.Demandas));
        const medC = getMediana(dados.map(d => d.Controle));

        let setores = {};
        dados.forEach(d => {
            if(!setores[d.setor]) setores[d.setor] = { d:[], c:[], a:[] };
            setores[d.setor].d.push(d.Demandas);
            setores[d.setor].c.push(d.Controle);
            setores[d.setor].a.push(d.Apoio);
        });

        let html = `<table><thead><tr><th>Setor</th><th>Status</th><th>Risco</th></tr></thead><tbody>`;
        for(let s in setores) {
            const mD = setores[s].d.reduce((a,b)=>a+b)/setores[s].d.length;
            const mC = setores[s].c.reduce((a,b)=>a+b)/setores[s].c.length;
            let q = "", c = "";
            if(mD > medD && mC < medC) { q="Alta Exigência"; c="#ef4444"; }
            else if(mD <= medD && mC >= medC) { q="Baixa Exigência"; c="#10b981"; }
            else { q="Trabalho Ativo/Passivo"; c="#f59e0b"; }

            html += `<tr><td><b>${s}</b></td><td>${q}</td><td><span class="risk-badge" style="background:${c}">Verificado</span></td></tr>`;
        }
        document.getElementById('tabela-resultados').innerHTML = html + "</tbody></table>";
        document.getElementById('interpretacao').innerHTML = `<b>Mediana do Grupo:</b> Demanda ${medD} | Controle ${medC}`;
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('screen-'+s).classList.add('active');
        document.getElementById('nav-'+s.substring(0,5)).classList.add('active');
    };
</script>
</body>
</html>
