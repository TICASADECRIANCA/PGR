<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGR Digital | Sistema de Auditoria JSS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #1e1b4b; /* Azul Escuro da Seleção Original */
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg); margin: 0; color: var(--text-main); }

        /* NAVBAR ORIGINAL */
        .nav-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* CARDS ORIGINAIS */
        .q-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* ESTILO BOTÃO DE RESPOSTA (VOLTANDO AO ANTERIOR) */
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-item { position: relative; }
        .option-item input[type="radio"] { position: absolute; opacity: 0; }

        .option-label {
            display: block;
            padding: 18px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            background: #fff;
        }

        .option-label:hover { border-color: var(--primary); background: #f8faff; }

        /* Azul Escuro ao Selecionar */
        .option-item input[type="radio"]:checked + .option-label {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            color: white;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 15px;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ADMIN DASHBOARD (NOVO) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card h4 { margin: 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0; font-size: 24px; font-weight: 800; color: var(--primary-dark); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        .progress-bg { background: #e2e8f0; border-radius: 10px; height: 6px; width: 100%; margin-top: 5px; }
        .progress-fill { background: var(--primary); height: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('login')">Painel de Auditoria</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-weight: 800; color: var(--primary); margin-bottom: 5px;">Avaliação JSS</h1>
            <p style="color: var(--text-muted);">Sua participação é anônima e fundamental.</p>
        </div>

        <div class="q-card">
            <div class="input-group">
                <input type="text" id="cpf-input" placeholder="CPF (Apenas números)" maxlength="11">
                <select id="setor-select">
                    <option value="">Selecione seu Setor...</option>
                    <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                    <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                    <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                    <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                    <option value="TI">TI</option>
                    <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                    <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                    <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                    <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                    <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                    <option value="EVENTOS">EVENTOS</option>
                    <option value="ENFERMAGEM">ENFERMAGEM</option>
                    <option value="DIRETORIA">DIRETORIA</option>
                </select>
            </div>
        </div>

        <form id="form-pgr">
            <div id="container-questoes"></div>
            <button type="button" onclick="enviarDados()" class="primary-btn">FINALIZAR E ENVIAR</button>
        </form>
    </section>

    <section id="screen-login" class="screen">
        <div class="q-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2>🔒 Acesso Restrito</h2>
            <input type="password" id="admin-pass" placeholder="Senha Mestra" style="margin-bottom: 20px;">
            <button class="primary-btn" onclick="verificarSenha()">ENTRAR</button>
        </div>
    </section>

    <section id="screen-admin" class="screen">
        <div class="stats-grid">
            <div class="stat-card"><h4>Total Funcionários</h4><p id="total-base">0</p></div>
            <div class="stat-card"><h4>Realizados</h4><p id="total-feitos" style="color: var(--success)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="total-pendentes" style="color: var(--danger)">0</p></div>
            <div class="stat-card"><h4>Adesão</h4><p id="total-adesao">0%</p></div>
        </div>

        <div class="q-card">
            <div class="input-group">
                <div>
                    <label style="font-size: 12px; font-weight: 700;">Filtrar Setor:</label>
                    <select id="filtro-setor" onchange="gerarRelatorio()">
                        <option value="GERAL">Geral Empresa</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 700;">Importar Base (TXT):</label>
                    <input type="file" id="import-txt" accept=".txt">
                </div>
            </div>
        </div>

        <div class="q-card">
            <canvas id="chartRadar" style="max-height: 400px;"></canvas>
        </div>

        <div class="q-card">
            <h3>📊 Status Detalhado por Setor</h3>
            <div id="tabela-adesao"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const SENHA_MESTRA = "pgr2024";

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Com que frequência você tem que fazer suas tarefas com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Com que frequência você tem que trabalhar intensamente?" },
        { id: 3, dim: "Demandas", txt: "Seu trabalho exige demais de você?" },
        { id: 4, dim: "Demandas", txt: "Você tem tempo suficiente para cumprir todas as tarefas?", inv: true },
        { id: 5, dim: "Demandas", txt: "O seu trabalho costuma apresentar exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Você tem possibilidade de aprender coisas novas em seu trabalho?" },
        { id: 7, dim: "Controle", txt: "Seu trabalho exige muita habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Seu trabalho exige que você tome iniciativas?" },
        { id: 9, dim: "Controle", txt: "No seu trabalho, você tem que repetir muitas vezes as mesmas tarefas?", inv: true },
        { id: 10, dim: "Controle", txt: "Você pode escolher COMO fazer o seu trabalho?" },
        { id: 11, dim: "Controle", txt: "Você pode escolher O QUE fazer no seu trabalho?" },
        { id: 12, dim: "Apoio", txt: "Existe um ambiente calmo e agradável onde trabalho?" },
        { id: 13, dim: "Apoio", txt: "No trabalho, nos relacionamos bem uns com os outros." },
        { id: 14, dim: "Apoio", txt: "Eu posso contar com o apoio dos meus colegas." },
        { id: 15, dim: "Apoio", txt: "Se eu não estiver num bom dia, meus colegas compreendem." },
        { id: 16, dim: "Apoio", txt: "No trabalho, eu me relaciono bem com meus chefes." },
        { id: 17, dim: "Apoio", txt: "Eu gosto de trabalhar com meus colegas." }
    ];

    // Gerar Perguntas (Estética anterior)
    const container = document.getElementById('container-questoes');
    perguntas.forEach(p => {
        const labels = p.id >= 12 ? ["Concordo Totalmente", "Concordo Parcialmente", "Discordo Parcialmente", "Discordo Totalmente"] : ["Frequentemente", "Às vezes", "Raramente", "Nunca"];
        let options = labels.map((l, i) => `
            <div class="option-item">
                <input type="radio" name="q${p.id}" id="q${p.id}_${i}" value="${4-i}" required>
                <label for="q${p.id}_${i}" class="option-label">${l}</label>
            </div>
        `).join('');

        container.innerHTML += `
            <div class="q-card">
                <span style="font-size:11px; font-weight:800; color:var(--primary); margin-bottom:10px; display:block;">${p.dim.toUpperCase()}</span>
                <p style="font-weight: 700; margin-bottom: 20px;">${p.id}. ${p.txt}</p>
                <div class="options-container">${options}</div>
            </div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g, '');
        const setor = document.getElementById('setor-select').value;
        const respondidas = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor) return alert("CPF ou Setor inválidos.");
        if(respondidas.length < 17) return alert("Responda todas as perguntas.");

        const q = query(collection(db, "respostas_pgr"), where("cpf", "==", cpf));
        const check = await getDocs(q);
        if(!check.empty) return alert("Este CPF já enviou uma resposta.");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        respondidas.forEach(input => {
            const pId = parseInt(input.name.replace('q', ''));
            const p = perguntas.find(x => x.id === pId);
            let v = parseInt(input.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Avaliação enviada com sucesso!");
        location.reload();
    };

    window.verificarSenha = () => {
        if(document.getElementById('admin-pass').value === SENHA_MESTRA) switchScreen('admin');
        else alert("Senha Incorreta");
    };

    document.getElementById('import-txt').onchange = async (e) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const batch = writeBatch(db);
            reader.result.split('\n').forEach(l => {
                const [nome, setor] = l.split(',');
                if(nome && setor) batch.set(doc(collection(db, "base_funcionarios")), { nome: nome.trim(), setor: setor.trim().toUpperCase() });
            });
            await batch.commit();
            alert("Base atualizada!");
            gerarRelatorio();
        };
        reader.readAsText(e.target.files[0]);
    };

    let chartR;
    window.gerarRelatorio = async () => {
        const [rSnap, bSnap] = await Promise.all([getDocs(collection(db, "respostas_pgr")), getDocs(collection(db, "base_funcionarios"))]);
        const resps = rSnap.docs.map(d => d.data());
        const base = bSnap.docs.map(d => d.data());
        const filtro = document.getElementById('filtro-setor').value;

        const baseF = filtro === "GERAL" ? base : base.filter(b => b.setor === filtro);
        const respsF = filtro === "GERAL" ? resps : resps.filter(r => r.setor === filtro);

        document.getElementById('total-base').innerText = baseF.length;
        document.getElementById('total-feitos').innerText = respsF.length;
        document.getElementById('total-pendentes').innerText = baseF.length - respsF.length;
        document.getElementById('total-adesao').innerText = baseF.length > 0 ? Math.round((respsF.length/baseF.length)*100) + "%" : "0%";

        const mD = respsF.reduce((a,b)=>a+b.Demandas,0)/respsF.length || 0;
        const mC = respsF.reduce((a,b)=>a+b.Controle,0)/respsF.length || 0;
        const mA = respsF.reduce((a,b)=>a+b.Apoio,0)/respsF.length || 0;

        if(chartR) chartR.destroy();
        chartR = new Chart(document.getElementById('chartRadar'), {
            type: 'radar',
            data: {
                labels: ['Demandas', 'Controle', 'Apoio'],
                datasets: [{ label: filtro, data: [mD, mC, mA], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1' }]
            },
            options: { scales: { r: { min: 0, max: 24 } } }
        });

        const setores = ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"];
        let html = `<table><thead><tr><th>Setor</th><th>Progresso</th><th>Feitos</th><th>Pendentes</th></tr></thead><tbody>`;
        setores.forEach(s => {
            const f = resps.filter(r => r.setor === s).length;
            const t = base.filter(b => b.setor === s).length;
            const perc = t > 0 ? Math.round((f/t)*100) : 0;
            html += `<tr><td><b>${s}</b></td><td><div class="progress-bg"><div class="progress-fill" style="width:${perc}%"></div></div></td><td>${f}</td><td style="color:red">${t-f}</td></tr>`;
        });
        document.getElementById('tabela-adesao').innerHTML = html + "</tbody></table>";
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('screen-'+s).classList.add('active');
        if(s === 'admin') {
            document.getElementById('nav-admin').classList.add('active');
            gerarRelatorio();
        } else {
            document.getElementById('nav-colab').classList.add('active');
        }
    };

    const sel = document.getElementById('filtro-setor');
    ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"].forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
</script>
</body>
</html>
