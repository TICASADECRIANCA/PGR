<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGR Digital | Auditoria e Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #1e1b4b; --bg: #f8fafc;
            --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); }

        .nav-bar {
            background: #fff; padding: 1rem; display: flex; justify-content: center; gap: 15px;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .nav-btn {
            padding: 12px 24px; cursor: pointer; border-radius: 10px; border: none;
            background: none; color: var(--text-muted); font-weight: 600; transition: 0.3s;
        }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .q-card {
            background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px;
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-item { position: relative; }
        .option-item input[type="radio"] { position: absolute; opacity: 0; }
        .option-label {
            display: block; padding: 16px; border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .option-item input[type="radio"]:checked + .option-label {
            background: var(--primary-dark); color: white; border-color: var(--primary-dark);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: 800; color: var(--primary-dark); }

        .risk-card { padding: 20px; border-radius: 16px; border: 1px solid var(--border); border-left-width: 8px; border-left-style: solid; border-left-color: #ccc; }
        .risk-alto { border-left-color: var(--danger); background: #fff5f5; }
        .risk-alerta { border-left-color: var(--warning); background: #fffbeb; }
        .risk-baixo { border-left-color: var(--success); background: #f0fdf4; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-success { background: #dcfce7; color: #166534; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        .progress-bg { background: #e2e8f0; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; }

        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-top: 5px; }
        .primary-btn { background: var(--primary); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('login')">Painel de Auditoria</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary); font-weight: 800;">Avaliação Psicossocial</h1>
            <p style="color: var(--text-muted)">Preenchimento anônimo e seguro</p>
        </div>
        <div class="q-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="cpf-input" placeholder="Seu CPF (apenas números)" maxlength="11">
                <select id="setor-select">
                    <option value="">Selecione seu Setor...</option>
                    <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                    <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                    <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                    <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                    <option value="TI">TI</option>
                    <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                    <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                    <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                    <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                    <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                    <option value="EVENTOS">EVENTOS</option>
                    <option value="ENFERMAGEM">ENFERMAGEM</option>
                    <option value="DIRETORIA">DIRETORIA</option>
                </select>
            </div>
        </div>
        <form id="form-pgr">
            <div id="container-questoes"></div>
            <button type="button" class="primary-btn" onclick="enviarDados()" style="margin-bottom: 50px;">ENVIAR AVALIAÇÃO</button>
        </form>
    </section>

    <section id="screen-login" class="screen">
        <div class="q-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2>🔒 Acesso Restrito</h2>
            <input type="password" id="admin-pass" placeholder="Senha Mestra">
            <button class="primary-btn" onclick="verificarSenha()" style="margin-top: 15px;">ENTRAR</button>
        </div>
    </section>

    <section id="screen-admin" class="screen">
        <div class="stats-grid">
            <div class="stat-card"><h4>Funcionários</h4><p id="total-base">0</p></div>
            <div class="stat-card"><h4>Realizados</h4><p id="total-feitos" style="color: var(--success)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="total-pendentes" style="color: var(--danger)">0</p></div>
            <div class="stat-card"><h4>Adesão</h4><p id="total-adesao">0%</p></div>
        </div>

        <div class="q-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Filtrar Visão por Setor:</label>
                    <select id="filtro-setor" onchange="gerarRelatorio()">
                        <option value="GERAL">Visão Geral Empresa</option>
                    </select>
                </div>
                <div>
                    <label>Importar Base (.txt):</label>
                    <input type="file" id="import-txt" accept=".txt">
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="q-card">
                <h3>📊 Perfil Psicossocial</h3>
                <canvas id="chartRadar"></canvas>
            </div>
            <div id="risk-analysis-container">
                </div>
        </div>

        <div class="q-card">
            <h3>📋 Status de Adesão por Setor</h3>
            <div id="tabela-adesao"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const SENHA_MESTRA = "1992";

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Com que frequência você tem que fazer suas tarefas de trabalho com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Com que frequência você tem que trabalhar intensamente (isto é, produzir muito em pouco tempo)?" },
        { id: 3, dim: "Demandas", txt: "Seu trabalho exige demais de você?" },
        { id: 4, dim: "Demandas", txt: "Você tem tempo suficiente para cumprir todas as tarefas de seu trabalho?", inv: true },
        { id: 5, dim: "Demandas", txt: "O seu trabalho costuma apresentar exigências contraditórias ou discordantes?" },
        { id: 6, dim: "Controle", txt: "Você tem possibilidade de aprender coisas novas em seu trabalho?" },
        { id: 7, dim: "Controle", txt: "Seu trabalho exige muita habilidade ou conhecimentos especializados?" },
        { id: 8, dim: "Controle", txt: "Seu trabalho exige que você tome iniciativas?" },
        { id: 9, dim: "Controle", txt: "No seu trabalho, você tem que repetir muitas vezes as mesmas tarefas?", inv: true },
        { id: 10, dim: "Controle", txt: "Você pode escolher COMO fazer o seu trabalho?" },
        { id: 11, dim: "Controle", txt: "Você pode escolher O QUE fazer no seu trabalho?" },
        { id: 12, dim: "Apoio", txt: "Existe um ambiente calmo e agradável onde trabalho?" },
        { id: 13, dim: "Apoio", txt: "No trabalho, nos relacionamos bem uns com os outros." },
        { id: 14, dim: "Apoio", txt: "Eu posso contar com o apoio dos meus colegas de trabalho." },
        { id: 15, dim: "Apoio", txt: "Se eu não estiver num bom dia, meus colegas compreendem." },
        { id: 16, dim: "Apoio", txt: "No trabalho, eu me relaciono bem com meus chefes." },
        { id: 17, dim: "Apoio", txt: "Eu gosto de trabalhar com meus colegas?" }
    ];

    const contQ = document.getElementById('container-questoes');
    perguntas.forEach(p => {
        const labs = p.id >= 12 ? ["Concordo Totalmente", "Concordo Parcialmente", "Discordo Parcialmente", "Discordo Totalmente"] : ["Sempre", "Às vezes", "Raramente", "Nunca"];
        let opts = labs.map((l, i) => `
            <div class="option-item">
                <input type="radio" name="q${p.id}" id="q${p.id}_${i}" value="${4-i}" required>
                <label for="q${p.id}_${i}" class="option-label">${l}</label>
            </div>
        `).join('');
        contQ.innerHTML += `<div class="q-card"><b>${p.id}. ${p.txt}</b><div class="options-container" style="margin-top:15px">${opts}</div></div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g,'');
        const setor = document.getElementById('setor-select').value;
        const resps = document.querySelectorAll('input[type="radio"]:checked');
        if(cpf.length < 11 || !setor || resps.length < 17) return alert("Preencha tudo!");

        const check = await getDocs(query(collection(db, "respostas_pgr"), where("cpf", "==", cpf)));
        if(!check.empty) return alert("CPF já cadastrado.");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        resps.forEach(r => {
            const p = perguntas.find(x => x.id == r.name.replace('q',''));
            let v = parseInt(r.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Sucesso!"); location.reload();
    };

    window.verificarSenha = () => {
        if(document.getElementById('admin-pass').value === SENHA_MESTRA) switchScreen('admin');
        else alert("Senha incorreta.");
    };

    document.getElementById('import-txt').onchange = async (e) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const batch = writeBatch(db);
            reader.result.split('\n').forEach(l => {
                const [nome, setor] = l.split(',');
                if(nome && setor) batch.set(doc(collection(db, "base_funcionarios")), { nome: nome.trim(), setor: setor.trim().toUpperCase() });
            });
            await batch.commit(); alert("Base Importada!"); gerarRelatorio();
        };
        reader.readAsText(e.target.files[0]);
    };

    let chartR;
    window.gerarRelatorio = async () => {
        // 1. Busca dados novos (Sincronização)
        const [rSnap, bSnap] = await Promise.all([getDocs(collection(db, "respostas_pgr")), getDocs(collection(db, "base_funcionarios"))]);
        const resps = rSnap.docs.map(d => d.data());
        const base = bSnap.docs.map(d => d.data());
        const filtro = document.getElementById('filtro-setor').value;

        // 2. Limpeza do painel para evitar "fantasmas"
        const riskCont = document.getElementById('risk-analysis-container');
        riskCont.innerHTML = "";
        if(chartR) chartR.destroy();

        const baseF = filtro === "GERAL" ? base : base.filter(b => b.setor === filtro);
        const respsF = filtro === "GERAL" ? resps : resps.filter(r => r.setor === filtro);

        // 3. Estatísticas Básicas
        document.getElementById('total-base').innerText = baseF.length;
        document.getElementById('total-feitos').innerText = respsF.length;
        document.getElementById('total-pendentes').innerText = baseF.length - respsF.length;
        document.getElementById('total-adesao').innerText = baseF.length > 0 ? Math.round((respsF.length/baseF.length)*100)+"%" : "0%";

        // 4. Se não houver dados, para aqui
        if (respsF.length === 0) {
            riskCont.innerHTML = `<div class="risk-card">Nenhum dado encontrado para o filtro: <b>${filtro}</b></div>`;
            renderTabela(resps, base);
            return;
        }

        // 5. Cálculo de Médias
        const mD = respsF.reduce((a,b)=>a+b.Demandas,0)/respsF.length;
        const mC = respsF.reduce((a,b)=>a+b.Controle,0)/respsF.length;
        const mA = respsF.reduce((a,b)=>a+b.Apoio,0)/respsF.length;

        // 6. Análise Karasek Dinâmica
        let rTitulo="", rNivel="", rClasse="", rBadge="", rSugestao="";
        if(mD >= 15 && mC < 16) {
            rTitulo="Alta Tensão (Crítico)"; rNivel="Risco Psicossocial Alto"; rClasse="risk-alto"; rBadge="badge-danger";
            rSugestao="🚨 Reduzir carga horária/metas e aumentar autonomia técnica imediatamente.";
        } else if(mD >= 15 && mC >= 16) {
            rTitulo="Trabalho Ativo"; rNivel="Risco Moderado"; rClasse="risk-alerta"; rBadge="badge-warning";
            rSugestao="⚠️ Cuidado com o esgotamento (Burnout). Fortalecer apoio social e pausas.";
        } else if(mD < 15 && mC < 16) {
            rTitulo="Trabalho Passivo"; rNivel="Risco de Desmotivação"; rClasse="risk-alerta"; rBadge="badge-warning";
            rSugestao="📉 Baixa pressão, mas pouca autonomia. Risco de tédio e perda de produtividade.";
        } else {
            rTitulo="Baixa Tensão"; rNivel="Baixo Risco"; rClasse="risk-baixo"; rBadge="badge-success";
            rSugestao="✅ Cenário ideal. Manter feedbacks e clima organizacional positivo.";
        }

        riskCont.innerHTML = `
            <div class="risk-card ${rClasse}">
                <span class="badge ${rBadge}">${rNivel}</span>
                <h3 style="margin:0">${rTitulo}</h3>
                <p style="font-size:12px; color:var(--text-muted)">Diagnóstico Karasek para ${filtro}.</p>
            </div>
            <div class="risk-card ${rClasse}" style="margin-top:15px">
                <h4 style="margin:0">💡 Sugestão Estratégica</h4>
                <p style="font-size:14px; line-height:1.5">${rSugestao} ${mA < 18 ? '<br><br><b>Aviso:</b> Apoio social abaixo da média (necessário fortalecer integração).' : ''}</p>
            </div>`;

        // 7. Gráfico Radar
        chartR = new Chart(document.getElementById('chartRadar'), {
            type: 'radar',
            data: {
                labels: ['Demandas', 'Controle', 'Apoio'],
                datasets: [{ label: filtro, data: [mD, mC, mA], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1', borderWidth: 2 }]
            },
            options: { scales: { r: { min: 0, max: 24, ticks: { display: false } } } }
        });

        renderTabela(resps, base);
    };

    function renderTabela(resps, base) {
        const setores = ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"];
        let html = `<table><thead><tr><th>Setor</th><th>Adesão</th><th>Feitos</th><th>Pendentes</th></tr></thead><tbody>`;
        setores.forEach(s => {
            const f = resps.filter(r => r.setor === s).length;
            const t = base.filter(b => b.setor === s).length;
            const p = t > 0 ? Math.round((f/t)*100) : 0;
            html += `<tr><td><b>${s}</b></td><td><div class="progress-bg"><div class="progress-fill" style="width:${p}%"></div></div></td><td>${f}</td><td style="color:${t-f > 0 ? 'red' : 'green'}">${t-f}</td></tr>`;
        });
        document.getElementById('tabela-adesao').innerHTML = html + "</tbody></table>";
    }

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const target = s==='login'?'login':s==='admin'?'admin':'colaborador';
        document.getElementById('screen-'+target).classList.add('active');
        if(s === 'admin') { document.getElementById('nav-admin').classList.add('active'); gerarRelatorio(); }
        else if(s === 'colaborador') { document.getElementById('nav-colab').classList.add('active'); }
    };

    const sel = document.getElementById('filtro-setor');
    ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"].forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
</script>
</body>
</html>
