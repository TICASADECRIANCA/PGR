<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGR Digital | Auditoria e Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #1e1b4b; --bg: #f8fafc;
            --card-bg: #ffffff; --text-main: #0f172a; --border: #e2e8f0;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); }

        .nav-bar { background: #fff; padding: 1rem; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-btn { padding: 12px 24px; cursor: pointer; border-radius: 10px; border: none; background: none; color: #64748b; font-weight: 600; }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Dashboard Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-card h4 { margin: 0; color: #64748b; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 800; color: var(--primary-dark); }

        .q-card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .admin-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

        /* Tabela Estilizada */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 12px; color: #475569; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .progress-bg { background: #e2e8f0; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: var(--primary); height: 100%; transition: 0.5s; }

        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-top: 5px; }
        .primary-btn { background: var(--primary); color: white; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('login')">Painel de Gestão</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div class="q-card" style="text-align: center;">
            <h1 style="color: var(--primary); font-weight: 800;">Avaliação Psicossocial</h1>
            <div class="stats-grid" style="margin-top: 20px;">
                <div>
                    <label>Seu CPF:</label>
                    <input type="text" id="cpf-input" placeholder="000.000.000-00" maxlength="11">
                </div>
                <div>
                    <label>Seu Setor:</label>
                    <select id="setor-select">
                        <option value="">Selecione...</option>
                        <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                        <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                        <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                        <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                        <option value="TI">TI</option>
                        <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                        <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                        <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                        <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                        <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                        <option value="EVENTOS">EVENTOS</option>
                        <option value="ENFERMAGEM">ENFERMAGEM</option>
                        <option value="DIRETORIA">DIRETORIA</option>
                    </select>
                </div>
            </div>
        </div>
        <form id="container-questoes"></form>
        <button class="primary-btn" onclick="enviarDados()" style="margin-bottom: 50px;">ENVIAR MINHA AVALIAÇÃO</button>
    </section>

    <section id="screen-login" class="screen">
        <div class="q-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2>🔒 Acesso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Senha Mestra">
            <button class="primary-btn" onclick="verificarSenha()" style="margin-top: 15px;">ENTRAR</button>
        </div>
    </section>

    <section id="screen-admin" class="screen">
        <div class="stats-grid">
            <div class="stat-card"><h4>Total Colaboradores</h4><p id="total-base">0</p></div>
            <div class="stat-card"><h4>Realizados</h4><p id="total-feitos" style="color: var(--success)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="total-pendentes" style="color: var(--danger)">0</p></div>
            <div class="stat-card"><h4>Adesão Geral</h4><p id="total-adesao">0%</p></div>
        </div>

        <div class="admin-layout">
            <div class="q-card">
                <h3>⚙️ Configurações e Filtros</h3>
                <label>Filtrar Visão por Setor:</label>
                <select id="filtro-setor" onchange="gerarRelatorio()">
                    <option value="GERAL">TODOS OS SETORES</option>
                </select>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <label>Atualizar Lista de Funcionários (TXT):</label>
                <input type="file" id="import-txt" accept=".txt">
                <small id="status-upload" style="display:block; margin-top:5px; color:var(--success)"></small>
            </div>

            <div class="q-card">
                <h3>📊 Perfil Psicossocial (Médias)</h3>
                <canvas id="chartRadar"></canvas>
            </div>
        </div>

        <div class="q-card">
            <h3>📋 Status de Adesão por Setor</h3>
            <div id="tabela-adesao"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const SENHA_MESTRA = "pgr2024";

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Trabalha com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Trabalha intensamente?" },
        { id: 3, dim: "Demandas", txt: "Trabalho exige demais?" },
        { id: 4, dim: "Demandas", txt: "Tempo suficiente?", inv: true },
        { id: 5, dim: "Demandas", txt: "Exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Aprende coisas novas?" },
        { id: 7, dim: "Controle", txt: "Habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Toma iniciativas?" },
        { id: 9, dim: "Controle", txt: "Tarefas repetitivas?", inv: true },
        { id: 10, dim: "Controle", txt: "Escolhe COMO fazer?" },
        { id: 11, dim: "Controle", txt: "Escolhe O QUE fazer?" },
        { id: 12, dim: "Apoio", txt: "Ambiente agradável?" },
        { id: 13, dim: "Apoio", txt: "Relacionamento bom?" },
        { id: 14, dim: "Apoio", txt: "Apoio dos colegas?" },
        { id: 15, dim: "Apoio", txt: "Colegas compreensivos?" },
        { id: 16, dim: "Apoio", txt: "Relacionamento com chefia?" },
        { id: 17, dim: "Apoio", txt: "Gosta de trabalhar com os colegas?" }
    ];

    // Popular Perguntas
    const form = document.getElementById('container-questoes');
    perguntas.forEach(p => {
        form.innerHTML += `
            <div class="q-card">
                <p><b>${p.id}. ${p.txt}</b></p>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    ${[4,3,2,1].map(v => `
                        <label style="padding: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;">
                            <input type="radio" name="q${p.id}" value="${v}" required> 
                            ${v === 4 ? 'Sempre / Concordo' : v === 1 ? 'Nunca / Discordo' : 'Às vezes'}
                        </label>
                    `).join('')}
                </div>
            </div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g,'');
        const setor = document.getElementById('setor-select').value;
        const resps = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor || resps.length < 17) return alert("Preencha todos os campos.");

        const check = await getDocs(query(collection(db, "respostas_pgr"), where("cpf", "==", cpf)));
        if(!check.empty) return alert("CPF já respondeu.");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        resps.forEach(r => {
            const p = perguntas.find(x => x.id == r.name.replace('q',''));
            let v = parseInt(r.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Enviado com sucesso!"); location.reload();
    };

    window.verificarSenha = () => {
        if(document.getElementById('admin-pass').value === SENHA_MESTRA) switchScreen('admin');
        else alert("Senha incorreta.");
    };

    // Importar TXT
    document.getElementById('import-txt').onchange = async (e) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const batch = writeBatch(db);
            reader.result.split('\n').forEach(l => {
                const [nome, setor] = l.split(',');
                if(nome && setor) batch.set(doc(collection(db, "base_funcionarios")), { nome: nome.trim(), setor: setor.trim().toUpperCase() });
            });
            await batch.commit();
            document.getElementById('status-upload').innerText = "✅ Base atualizada!";
            gerarRelatorio();
        };
        reader.readAsText(e.target.files[0]);
    };

    let chartR;
    window.gerarRelatorio = async () => {
        const [rSnap, bSnap] = await Promise.all([getDocs(collection(db, "respostas_pgr")), getDocs(collection(db, "base_funcionarios"))]);
        const resps = rSnap.docs.map(d => d.data());
        const base = bSnap.docs.map(d => d.data());
        const filtro = document.getElementById('filtro-setor').value;

        // Filtragem para o Dashboard
        const baseFiltrada = filtro === "GERAL" ? base : base.filter(b => b.setor === filtro);
        const respsFiltradas = filtro === "GERAL" ? resps : resps.filter(r => r.setor === filtro);

        const total = baseFiltrada.length;
        const feitos = respsFiltradas.length;
        const pendentes = total - feitos;
        const adesao = total > 0 ? Math.round((feitos/total)*100) : 0;

        // Atualizar Dashboard
        document.getElementById('total-base').innerText = total;
        document.getElementById('total-feitos').innerText = feitos;
        document.getElementById('total-pendentes').innerText = pendentes;
        document.getElementById('total-adesao').innerText = adesao + "%";

        // Radar Chart
        const mD = respsFiltradas.reduce((a,b)=>a+b.Demandas,0)/feitos || 0;
        const mC = respsFiltradas.reduce((a,b)=>a+b.Controle,0)/feitos || 0;
        const mA = respsFiltradas.reduce((a,b)=>a+b.Apoio,0)/feitos || 0;

        if(chartR) chartR.destroy();
        chartR = new Chart(document.getElementById('chartRadar'), {
            type: 'radar',
            data: {
                labels: ['Demandas', 'Controle', 'Apoio'],
                datasets: [{ label: filtro, data: [mD, mC, mA], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1' }]
            },
            options: { scales: { r: { min: 0, max: 24 } } }
        });

        // Tabela de Adesão Detalhada
        const setores = ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"];
        let html = `<table><thead><tr><th>Setor</th><th>Progresso</th><th>Realizados</th><th>Pendentes</th><th>Total</th></tr></thead><tbody>`;
        
        setores.forEach(s => {
            const sFeitos = resps.filter(r => r.setor === s).length;
            const sTotal = base.filter(b => b.setor === s).length;
            const sPend = sTotal - sFeitos;
            const sPerc = sTotal > 0 ? Math.round((sFeitos/sTotal)*100) : 0;

            html += `
                <tr>
                    <td><b>${s}</b></td>
                    <td style="width: 200px;">
                        <div style="font-size: 11px; margin-bottom: 3px;">${sPerc}% concluído</div>
                        <div class="progress-bg"><div class="progress-fill" style="width: ${sPerc}%"></div></div>
                    </td>
                    <td>${sFeitos}</td>
                    <td style="color: ${sPend > 0 ? 'var(--danger)' : 'var(--success)'}">${sPend}</td>
                    <td>${sTotal}</td>
                </tr>`;
        });
        document.getElementById('tabela-adesao').innerHTML = html + "</tbody></table>";
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(s === 'admin') {
            document.getElementById('screen-admin').classList.add('active');
            document.getElementById('nav-admin').classList.add('active');
            gerarRelatorio();
        } else if(s === 'login') {
            document.getElementById('screen-login').classList.add('active');
        } else {
            document.getElementById('screen-colaborador').classList.add('active');
            document.getElementById('nav-colab').classList.add('active');
        }
    };

    // Filtros
    const sel = document.getElementById('filtro-setor');
    ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"].forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
</script>
</body>
</html>
