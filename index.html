<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação NR1 CDC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        .nav-bar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .q-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fdfdfd;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .stats-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
        }

        .option {
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .option:hover { background: #f8faff; border-color: var(--primary); }
        .option input { margin-right: 12px; cursor: pointer; }

        .primary-btn {
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
        }

        .interpretacao {
            background: #f0f9ff;
            border-left: 5px solid #0ea5e9;
            padding: 20px;
            border-radius: 8px;
            color: #0369a1;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-muted); padding: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        .risk-pill {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('admin')">Painel de Auditoria</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-weight: 800; font-size: 2.2rem; color: var(--primary);">Avaliação de Saúde Psicossocial</h1>
            <p style="color: var(--text-muted);">Preencha os dados abaixo para iniciar sua participação.</p>
        </header>

        <div class="q-card">
            <div class="input-group">
                <div>
                    <label style="font-size: 12px; font-weight: 700; margin-bottom: 5px; display: block;">CPF (SOMENTE NÚMEROS)</label>
                    <input type="text" id="cpf-input" placeholder="000.000.000-00" maxlength="11">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 700; margin-bottom: 5px; display: block;">SEU SETOR</label>
                    <select id="setor-select">
                        <option value="">Selecione...</option>
                        <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                        <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                        <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                        <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                        <option value="TI">TI</option>
                        <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                        <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                        <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                        <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                        <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                        <option value="EVENTOS">EVENTOS</option>
                        <option value="ENFERMAGEM">ENFERMAGEM</option>
                        <option value="DIRETORIA">DIRETORIA</option>
                    </select>
                </div>
            </div>
        </div>

        <form id="form-pgr">
            <div id="container-questoes"></div>
            <button type="button" id="btn-enviar" onclick="enviarDados()" class="primary-btn">ENVIAR AVALIAÇÃO</button>
        </form>
    </section>

    <section id="screen-admin" class="screen">
        <div class="q-card" style="text-align: center;">
            <h2 style="margin: 0;">Dashboard de Riscos Psicossociais</h2>
            <p>Análise baseada na mediana do grupo (Modelo Karasek)</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <input type="file" id="file-txt" accept=".txt" style="width: auto;">
                <button onclick="gerarRelatorio()" class="primary-btn" style="width: auto; padding: 10px 30px;">ATUALIZAR DADOS</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="q-card"><canvas id="chartSetores"></canvas></div>
            <div class="q-card"><canvas id="chartRiscos"></canvas></div>
        </div>

        <div class="q-card">
            <div id="interpretacao-texto" class="interpretacao">Aguardando processamento...</div>
            <div id="relatorio-box"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Com que frequência você tem que fazer suas tarefas com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Com que frequência você tem que trabalhar intensamente?" },
        { id: 3, dim: "Demandas", txt: "Seu trabalho exige demais de você?" },
        { id: 4, dim: "Demandas", txt: "Você tem tempo suficiente para cumprir todas as tarefas?", inv: true },
        { id: 5, dim: "Demandas", txt: "O seu trabalho costuma apresentar exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Você tem possibilidade de aprender coisas novas em seu trabalho?" },
        { id: 7, dim: "Controle", txt: "Seu trabalho exige muita habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Seu trabalho exige que você tome iniciativas?" },
        { id: 9, dim: "Controle", txt: "No seu trabalho, você tem que repetir muitas vezes as mesmas tarefas?", inv: true },
        { id: 10, dim: "Controle", txt: "Você pode escolher COMO fazer o seu trabalho?" },
        { id: 11, dim: "Controle", txt: "Você pode escolher O QUE fazer no seu trabalho?" },
        { id: 12, dim: "Apoio", txt: "Existe um ambiente calmo e agradável onde trabalho?" },
        { id: 13, dim: "Apoio", txt: "No trabalho, nos relacionamos bem uns com os outros." },
        { id: 14, dim: "Apoio", txt: "Eu posso contar com o apoio dos meus colegas." },
        { id: 15, dim: "Apoio", txt: "Se eu não estiver num bom dia, meus colegas compreendem." },
        { id: 16, dim: "Apoio", txt: "No trabalho, eu me relaciono bem com meus chefes." },
        { id: 17, dim: "Apoio", txt: "Eu gosto de trabalhar com meus colegas." }
    ];

    let chartS = null, chartR = null;

    // Renderizar questões
    const container = document.getElementById('container-questoes');
    perguntas.forEach(p => {
        const cor = p.dim === "Demandas" ? "#e0e7ff" : (p.dim === "Controle" ? "#d1fae5" : "#fef3c7");
        const txtCor = p.dim === "Demandas" ? "#4338ca" : (p.dim === "Controle" ? "#065f46" : "#92400e");
        const labels = p.id >= 12 ? ["Concordo Totalmente", "Concordo Parcialmente", "Discordo Parcialmente", "Discordo Totalmente"] : ["Frequentemente", "Às vezes", "Raramente", "Nunca"];
        
        container.innerHTML += `
            <div class="q-card">
                <span class="stats-badge" style="background:${cor}; color:${txtCor}">${p.dim}</span>
                <p style="font-weight: 700; margin-bottom: 15px;">${p.id}. ${p.txt}</p>
                ${labels.map((l, i) => `
                    <div class="option">
                        <label><input type="radio" name="q${p.id}" value="${4-i}" required> ${l}</label>
                    </div>
                `).join('')}
            </div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g, '');
        const setor = document.getElementById('setor-select').value;
        const respondidas = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor) return alert("CPF ou Setor inválidos.");
        if(respondidas.length < 17) return alert("Responda todas as 17 perguntas.");

        // Trava por CPF
        const q = query(collection(db, "respostas_pgr"), where("cpf", "==", cpf));
        const check = await getDocs(q);
        if(!check.empty) return alert("Este CPF já enviou uma resposta.");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        respondidas.forEach(input => {
            const pId = parseInt(input.name.replace('q', ''));
            const p = perguntas.find(x => x.id === pId);
            let v = parseInt(input.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Enviado com sucesso!");
        location.reload();
    };

    function getMediana(arr) {
        if(!arr.length) return 0;
        const s = [...arr].sort((a,b) => a-b);
        const m = Math.floor(s.length/2);
        return s.length % 2 !== 0 ? s[m] : (s[m-1] + s[m])/2;
    }

    window.gerarRelatorio = async () => {
        const snap = await getDocs(collection(db, "respostas_pgr"));
        const dados = snap.docs.map(d => d.data());
        if(!dados.length) return;

        const medD = getMediana(dados.map(d => d.Demandas));
        const medC = getMediana(dados.map(d => d.Controle));

        let setores = {};
        dados.forEach(d => {
            if(!setores[d.setor]) setores[d.setor] = { d:[], c:[], a:[] };
            setores[d.setor].d.push(d.Demandas);
            setores[d.setor].c.push(d.Controle);
            setores[d.setor].a.push(d.Apoio);
        });

        // Gráficos
        if(chartS) chartS.destroy();
        chartS = new Chart(document.getElementById('chartSetores'), {
            type: 'bar',
            data: { labels: Object.keys(setores), datasets: [{ label: 'Respostas por Setor', data: Object.keys(setores).map(s => setores[s].d.length), backgroundColor: '#6366f1' }] }
        });

        // Tabela
        let html = `<table><thead><tr><th>Setor</th><th>Quadrante</th><th>Risco</th><th>Ação</th></tr></thead><tbody>`;
        for(let s in setores) {
            const mD = setores[s].d.reduce((a,b)=>a+b)/setores[s].d.length;
            const mC = setores[s].c.reduce((a,b)=>a+b)/setores[s].c.length;
            
            let quad = "", cor = "", r = "";
            if(mD > medD && mC < medC) { quad="Alta Exigência"; r="ALTO"; cor="#ef4444"; }
            else if(mD > medD && mC >= medC) { quad="Ativo"; r="Médio"; cor="#f59e0b"; }
            else if(mD <= medD && mC < medC) { quad="Passivo"; r="Médio"; cor="#f59e0b"; }
            else { quad="Baixa Exigência"; r="Baixo"; cor="#10b981"; }

            html += `<tr>
                <td><b>${s}</b></td>
                <td>${quad}</td>
                <td><span class="risk-pill" style="background:${cor}">${r}</span></td>
                <td>${r === 'ALTO' ? 'Intervenção 30d' : 'Monitorar'}</td>
            </tr>`;
        }
        document.getElementById('relatorio-box').innerHTML = html + "</tbody></table>";
        document.getElementById('interpretacao-texto').innerHTML = `<b>Medianas Calculadas:</b> Demanda ${medD} | Controle ${medC}. Os setores em vermelho exigem atenção imediata.`;
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('screen-'+s).classList.add('active');
        document.getElementById('nav-'+s.substring(0,5)).classList.add('active');
        if(s === 'admin') window.gerarRelatorio();
    };
</script>
</body>
</html>
