<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGR Digital - Sistema de Auditoria NR1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #1e1b4b; --bg: #f8fafc;
            --card-bg: #ffffff; --text-main: #0f172a; --border: #e2e8f0;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); line-height: 1.6; }

        .nav-bar { background: #fff; padding: 1rem; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-btn { padding: 12px 24px; cursor: pointer; border-radius: 10px; border: 1px solid transparent; font-weight: 600; background: none; color: #64748b; }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .q-card { background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .option-item input { display: none; }
        .option-label { display: block; padding: 15px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
        .option-item input:checked + .option-label { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }

        .primary-btn { background: var(--primary); color: white; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .interpretacao-box { background: #f0f9ff; border-left: 5px solid var(--primary); padding: 20px; margin-top: 15px; border-radius: 8px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('admin')">Painel Restrito</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div class="q-card" style="text-align: center;">
            <h1 style="color: var(--primary)">Avaliação Psicossocial JSS</h1>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <input type="text" id="cpf-input" placeholder="CPF (Somente números)" maxlength="11">
                <select id="setor-select">
                    <option value="">Selecione seu Setor...</option>
                    <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                    <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                    <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                    <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                    <option value="TI">TI</option>
                    <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                    <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                    <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                    <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                    <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                    <option value="EVENTOS">EVENTOS</option>
                    <option value="ENFERMAGEM">ENFERMAGEM</option>
                    <option value="DIRETORIA">DIRETORIA</option>
                </select>
            </div>
        </div>
        <form id="form-questoes"></form>
        <button class="primary-btn" onclick="enviarDados()" style="margin-top: 20px; margin-bottom: 40px;">ENVIAR AVALIAÇÃO</button>
    </section>

    <section id="screen-login" class="screen">
        <div class="q-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2>🔒 Acesso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Insira a senha mestra" style="margin-bottom: 15px;">
            <button class="primary-btn" onclick="verificarSenha()">ENTRAR NO PAINEL</button>
        </div>
    </section>

    <section id="screen-admin" class="screen">
        <div class="admin-grid">
            <div class="q-card">
                <h3>📤 Base de Funcionários (TXT)</h3>
                <input type="file" id="import-txt" accept=".txt">
                <p id="status-upload" style="font-size: 12px; color: var(--success); margin-top: 10px;"></p>
            </div>
            <div class="q-card">
                <h3>🔍 Filtro por Setor</h3>
                <select id="filtro-setor" onchange="gerarRelatorio()">
                    <option value="GERAL">Visão Geral Empresa</option>
                </select>
            </div>
        </div>

        <div class="admin-grid">
            <div class="q-card"><canvas id="chartRadar"></canvas></div>
            <div class="q-card"><canvas id="chartAdesao"></canvas></div>
        </div>

        <div class="q-card">
            <h3>📑 Relatório de Auditoria e Quórum</h3>
            <div id="box-interpretacao" class="interpretacao-box">Nenhum dado processado.</div>
            <div id="tabela-quorum"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const SENHA_MESTRA = "pgr2024";

    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Trabalha com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Trabalha intensamente?" },
        { id: 3, dim: "Demandas", txt: "Trabalho exige demais?" },
        { id: 4, dim: "Demandas", txt: "Tempo suficiente?", inv: true },
        { id: 5, dim: "Demandas", txt: "Exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Aprende coisas novas?" },
        { id: 7, dim: "Controle", txt: "Habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Toma iniciativas?" },
        { id: 9, dim: "Controle", txt: "Tarefas repetitivas?", inv: true },
        { id: 10, dim: "Controle", txt: "Escolhe COMO fazer?" },
        { id: 11, dim: "Controle", txt: "Escolhe O QUE fazer?" },
        { id: 12, dim: "Apoio", txt: "Ambiente agradável?" },
        { id: 13, dim: "Apoio", txt: "Relacionamento bom?" },
        { id: 14, dim: "Apoio", txt: "Apoio dos colegas?" },
        { id: 15, dim: "Apoio", txt: "Colegas compreensivos?" },
        { id: 16, dim: "Apoio", txt: "Relacionamento com chefia?" },
        { id: 17, dim: "Apoio", txt: "Gosta de trabalhar com os colegas?" }
    ];

    const form = document.getElementById('form-questoes');
    perguntas.forEach(p => {
        form.innerHTML += `
            <div class="q-card">
                <p><b>${p.id}. ${p.txt}</b></p>
                <div class="options-container">
                    ${[4,3,2,1].map(v => `
                        <label class="option-item">
                            <input type="radio" name="q${p.id}" value="${v}" required>
                            <span class="option-label">${v === 4 ? 'Sempre / Concordo' : v === 1 ? 'Nunca / Discordo' : 'Às vezes'}</span>
                        </label>
                    `).join('')}
                </div>
            </div>`;
    });

    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g,'');
        const setor = document.getElementById('setor-select').value;
        const resp = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor || resp.length < 17) return alert("Preencha CPF, Setor e todas as 17 questões.");

        const q = query(collection(db, "respostas_pgr"), where("cpf", "==", cpf));
        const check = await getDocs(q);
        if(!check.empty) return alert("Este CPF já enviou uma resposta!");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        resp.forEach(r => {
            const p = perguntas.find(x => x.id == r.name.replace('q',''));
            let v = parseInt(r.value);
            if(p.inv) v = 5 - v;
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Avaliação enviada!"); location.reload();
    };

    window.verificarSenha = () => {
        if(document.getElementById('admin-pass').value === SENHA_MESTRA) {
            document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
            document.getElementById('screen-admin').classList.add('active');
            window.gerarRelatorio().catch(e => console.log("Banco ainda vazio."));
        } else {
            alert("Senha Incorreta!");
        }
    };

    document.getElementById('import-txt').onchange = async (e) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const linhas = reader.result.split('\n');
            const batch = writeBatch(db);
            linhas.forEach(l => {
                const [nome, setor] = l.split(',');
                if(nome && setor) {
                    const docRef = doc(collection(db, "base_funcionarios"));
                    batch.set(docRef, { nome: nome.trim(), setor: setor.trim().toUpperCase() });
                }
            });
            await batch.commit();
            document.getElementById('status-upload').innerText = "✅ Lista salva no banco com sucesso!";
            window.gerarRelatorio();
        };
        reader.readAsText(e.target.files[0]);
    };

    let chartR, chartA;
    window.gerarRelatorio = async () => {
        const [rSnap, bSnap] = await Promise.all([getDocs(collection(db, "respostas_pgr")), getDocs(collection(db, "base_funcionarios"))]);
        const resps = rSnap.docs.map(d => d.data());
        const base = bSnap.docs.map(d => d.data());
        const filtro = document.getElementById('filtro-setor').value;
        const filtrados = filtro === "GERAL" ? resps : resps.filter(r => r.setor === filtro);

        const mD = filtrados.reduce((a,b)=>a+b.Demandas,0)/filtrados.length || 0;
        const mC = filtrados.reduce((a,b)=>a+b.Controle,0)/filtrados.length || 0;
        const mA = filtrados.reduce((a,b)=>a+b.Apoio,0)/filtrados.length || 0;

        if(chartR) chartR.destroy();
        chartR = new Chart(document.getElementById('chartRadar'), {
            type: 'radar',
            data: {
                labels: ['Demandas', 'Controle', 'Apoio'],
                datasets: [{ label: filtro, data: [mD, mC, mA], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1' }]
            },
            options: { scales: { r: { min: 0, max: 24 } } }
        });

        const setores = ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"];
        let html = `<table><thead><tr><th>Setor</th><th>Respondidos</th><th>Total Base</th><th>% Adesão</th></tr></thead><tbody>`;
        setores.forEach(s => {
            const nResp = resps.filter(r => r.setor === s).length;
            const nBase = base.filter(b => b.setor === s).length;
            html += `<tr><td>${s}</td><td>${nResp}</td><td>${nBase}</td><td>${nBase > 0 ? Math.round((nResp/nBase)*100) : 0}%</td></tr>`;
        });
        document.getElementById('tabela-quorum').innerHTML = html + "</tbody></table>";
        document.getElementById('box-interpretacao').innerHTML = `<b>Análise Técnica:</b> O setor <b>${filtro}</b> apresenta média de Demanda ${mD.toFixed(1)}. Status: ${mD > 15 ? '⚠️ ATENÇÃO' : '✅ NORMAL'}`;
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(s === 'admin') {
            document.getElementById('screen-login').classList.add('active');
            document.getElementById('nav-admin').classList.add('active');
        } else {
            document.getElementById('screen-colaborador').classList.add('active');
            document.getElementById('nav-colab').classList.add('active');
        }
    };

    const fs = document.getElementById('filtro-setor');
    ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"].forEach(s => {
        fs.innerHTML += `<option value="${s}">${s}</option>`;
    });
</script>
</body>
</html>
