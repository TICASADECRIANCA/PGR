<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PGR Digital - Auditoria NR1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #1e1b4b; --bg: #f8fafc;
            --card-bg: #ffffff; --text-main: #0f172a; --border: #e2e8f0;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); line-height: 1.6; }

        .nav-bar { background: #fff; padding: 1rem; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-btn { padding: 12px 24px; cursor: pointer; border-radius: 10px; border: 1px solid transparent; font-weight: 600; background: none; color: #64748b; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .q-card { background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f1f5f9; }

        .primary-btn { background: var(--primary); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; }
        .secondary-btn { background: #e2e8f0; color: #475569; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }

        .options-container { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .option-item input { display: none; }
        .option-label { display: block; padding: 15px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-item input:checked + .option-label { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }

        .interpretacao-box { background: #f0f9ff; border-left: 5px solid var(--primary); padding: 20px; margin-top: 15px; border-radius: 0 12px 12px 0; }
        .plan-box { background: #fff7ed; border-left: 5px solid var(--warning); padding: 20px; margin-top: 15px; border-radius: 0 12px 12px 0; }
        
        .stats-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <button id="nav-colab" class="nav-btn active" onclick="switchScreen('colaborador')">Modo Colaborador</button>
    <button id="nav-admin" class="nav-btn" onclick="switchScreen('admin')">Painel de Auditoria</button>
</nav>

<div class="container">
    <section id="screen-colaborador" class="screen active">
        <div class="q-card" style="text-align: center;">
            <h1 style="color: var(--primary); margin-bottom: 10px;">Avaliação Psicossocial (Karasek JSS)</h1>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <input type="text" id="cpf-input" placeholder="Seu CPF (Somente números)" maxlength="11" style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid var(--border);">
                <select id="setor-select" style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid var(--border);">
                    <option value="">Selecione seu Setor...</option>
                    <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
                    <option value="PEDAGÓGICO">PEDAGÓGICO</option>
                    <option value="ESPECIALIDADES">ESPECIALIDADES</option>
                    <option value="NUTRIÇÃO">NUTRIÇÃO</option>
                    <option value="TI">TI</option>
                    <option value="COMUNICAÇÃO">COMUNICAÇÃO</option>
                    <option value="INFRAESTRUTURA">INFRAESTRUTURA</option>
                    <option value="SISTEMA INTEGRAL">SISTEMA INTEGRAL</option>
                    <option value="RECURSOS HUMANOS">RECURSOS HUMANOS</option>
                    <option value="DEPARTAMENTO PESSOAL">DEPARTAMENTO PESSOAL</option>
                    <option value="EVENTOS">EVENTOS</option>
                    <option value="ENFERMAGEM">ENFERMAGEM</option>
                    <option value="DIRETORIA">DIRETORIA</option>
                </select>
            </div>
        </div>
        <form id="form-questoes"></form>
        <button class="primary-btn" onclick="enviarDados()" style="margin-top: 20px; margin-bottom: 50px;">FINALIZAR E ENVIAR RESPOSTAS</button>
    </section>

    <section id="screen-admin" class="screen">
        <div class="admin-grid">
            <div class="q-card">
                <h3>📂 Importar Base de Funcionários</h3>
                <p style="font-size: 12px; color: #64748b;">Suba um arquivo .txt com: Nome, Setor</p>
                <input type="file" id="import-txt" accept=".txt" class="secondary-btn">
            </div>
            <div class="q-card">
                <h3>🔍 Filtro por Unidade/Setor</h3>
                <select id="filtro-setor" onchange="gerarRelatorio()" style="width: 100%; padding: 12px; border-radius: 8px;">
                    <option value="GERAL">Visão Geral da Empresa</option>
                    </select>
            </div>
        </div>

        <div class="admin-grid">
            <div class="q-card">
                <h3>📈 Gráfico de Impacto (Médias)</h3>
                <canvas id="chartRadar"></canvas>
            </div>
            <div class="q-card">
                <h3>📊 Adesão por Setor</h3>
                <canvas id="chartAdesao"></canvas>
            </div>
        </div>

        <div class="q-card">
            <h3>📑 Resumo Técnico para Auditoria</h3>
            <div id="box-interpretacao" class="interpretacao-box">Aguardando processamento...</div>
            <div id="box-plano" class="plan-box">Aguardando processamento...</div>
            <div id="tabela-quorum"></div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiDnudAseB_doNU0cMHPqF8sDZ_UL7ILA",
        authDomain: "pgrcdc-a6d0f.firebaseapp.com",
        projectId: "pgrcdc-a6d0f",
        storageBucket: "pgrcdc-a6d0f.firebasestorage.app",
        messagingSenderId: "540389187712",
        appId: "1:540389187712:web:59b890f342e0050fe3c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    // TODAS AS 17 PERGUNTAS ORIGINAIS
    const perguntas = [
        { id: 1, dim: "Demandas", txt: "Com que frequência você tem que fazer suas tarefas com muita rapidez?" },
        { id: 2, dim: "Demandas", txt: "Com que frequência você tem que trabalhar intensamente?" },
        { id: 3, dim: "Demandas", txt: "Seu trabalho exige demais de você?" },
        { id: 4, dim: "Demandas", txt: "Você tem tempo suficiente para cumprir todas as tarefas?", inv: true },
        { id: 5, dim: "Demandas", txt: "O seu trabalho costuma apresentar exigências contraditórias?" },
        { id: 6, dim: "Controle", txt: "Você tem possibilidade de aprender coisas novas em seu trabalho?" },
        { id: 7, dim: "Controle", txt: "Seu trabalho exige muita habilidade especializada?" },
        { id: 8, dim: "Controle", txt: "Seu trabalho exige que você tome iniciativas?" },
        { id: 9, dim: "Controle", txt: "No seu trabalho, você tem que repetir muitas vezes as mesmas tarefas?", inv: true },
        { id: 10, dim: "Controle", txt: "Você pode escolher COMO fazer o seu trabalho?" },
        { id: 11, dim: "Controle", txt: "Você pode escolher O QUE fazer no seu trabalho?" },
        { id: 12, dim: "Apoio", txt: "Existe um ambiente calmo e agradável onde trabalho?" },
        { id: 13, dim: "Apoio", txt: "No trabalho, nos relacionamos bem uns com os outros." },
        { id: 14, dim: "Apoio", txt: "Eu posso contar com o apoio dos meus colegas." },
        { id: 15, dim: "Apoio", txt: "Se eu não estiver num bom dia, meus colegas compreendem." },
        { id: 16, dim: "Apoio", txt: "No trabalho, eu me relaciono bem com meus chefes." },
        { id: 17, dim: "Apoio", txt: "Eu gosto de trabalhar com meus colegas." }
    ];

    let baseFuncionarios = [];

    // Renderizar formulário
    const form = document.getElementById('form-questoes');
    perguntas.forEach(p => {
        const labels = p.id >= 12 ? ["Concordo Totalmente", "Concordo Parcialmente", "Discordo Parcialmente", "Discordo Totalmente"] : ["Frequentemente", "Às vezes", "Raramente", "Nunca"];
        const cor = p.dim === "Demandas" ? "#e0e7ff" : (p.dim === "Controle" ? "#d1fae5" : "#fef3c7");
        const txtC = p.dim === "Demandas" ? "#4338ca" : (p.dim === "Controle" ? "#065f46" : "#92400e");

        form.innerHTML += `
            <div class="q-card">
                <span class="stats-badge" style="background:${cor}; color:${txtC}">${p.dim}</span>
                <p><b>${p.id}. ${p.txt}</b></p>
                <div class="options-container">
                    ${labels.map((l, i) => `
                        <label class="option-item">
                            <input type="radio" name="q${p.id}" value="${4-i}" required>
                            <span class="option-label">${l} (Peso: ${4-i})</span>
                        </label>
                    `).join('')}
                </div>
            </div>`;
    });

    // Enviar dados com trava de CPF
    window.enviarDados = async () => {
        const cpf = document.getElementById('cpf-input').value.replace(/\D/g, '');
        const setor = document.getElementById('setor-select').value;
        const resp = document.querySelectorAll('input[type="radio"]:checked');

        if(cpf.length < 11 || !setor) return alert("CPF ou Setor incompleto!");
        if(resp.length < 17) return alert("Por favor, responda todas as 17 perguntas!");

        const q = query(collection(db, "respostas_pgr"), where("cpf", "==", cpf));
        const check = await getDocs(q);
        if(!check.empty) return alert("Este CPF já enviou uma resposta!");

        let somas = { Demandas: 0, Controle: 0, Apoio: 0 };
        resp.forEach(input => {
            const pId = parseInt(input.name.replace('q', ''));
            const p = perguntas.find(x => x.id === pId);
            let v = parseInt(input.value);
            if(p.inv) v = 5 - v; // Inversão científica das questões 4 e 9
            somas[p.dim] += v;
        });

        await addDoc(collection(db, "respostas_pgr"), { cpf, setor, ...somas, data: new Date().toISOString() });
        alert("Enviado com sucesso!");
        location.reload();
    };

    // Lógica Administrativa
    let chartR, chartA;
    window.gerarRelatorio = async () => {
        const snap = await getDocs(collection(db, "respostas_pgr"));
        const respondidos = snap.docs.map(d => d.data());
        const filtro = document.getElementById('filtro-setor').value;

        const dadosF = filtro === "GERAL" ? respondidos : respondidos.filter(d => d.setor === filtro);
        
        const mD = dadosF.reduce((a,b)=>a+b.Demandas,0)/dadosF.length || 0;
        const mC = dadosF.reduce((a,b)=>a+b.Controle,0)/dadosF.length || 0;
        const mA = dadosF.reduce((a,b)=>a+b.Apoio,0)/dadosF.length || 0;

        // Gráfico Radar (Impacto)
        if(chartR) chartR.destroy();
        chartR = new Chart(document.getElementById('chartRadar'), {
            type: 'radar',
            data: {
                labels: ['Demanda', 'Controle', 'Apoio Social'],
                datasets: [{ label: 'Média do Setor', data: [mD, mC, mA], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1' }]
            },
            options: { scales: { r: { min: 0, max: 24 } } }
        });

        // Gráfico Adesão
        const setoresLista = ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"];
        if(chartA) chartA.destroy();
        chartA = new Chart(document.getElementById('chartAdesao'), {
            type: 'bar',
            data: {
                labels: setoresLista,
                datasets: [{ label: 'Respostas Recebidas', data: setoresLista.map(s => respondidos.filter(r => r.setor === s).length), backgroundColor: '#1e1b4b' }]
            }
        });

        // Interpretação Técnica
        let texto = `<b>Análise:</b> Para o grupo ${filtro}, a média de Demanda está em ${mD.toFixed(1)} e Controle em ${mC.toFixed(1)}. `;
        let plano = "";
        
        if(mD > 15 && mC < 15) {
            texto += "O setor encontra-se no quadrante de <b>ALTA TENSÃO</b> (Alto Risco).";
            plano = "<b>Plano de Ação:</b> Redefinição de fluxos, análise de sobrecarga e treinamento de autonomia.";
        } else {
            texto += "O setor encontra-se em zona de <b>BAIXO RISCO</b> ou Trabalho Ativo.";
            plano = "<b>Plano de Ação:</b> Manutenção preventiva e feedbacks periódicos.";
        }
        document.getElementById('box-interpretacao').innerHTML = texto;
        document.getElementById('box-plano').innerHTML = plano;

        // Tabela de Quórum
        let html = `<table><thead><tr><th>Setor</th><th>Respondidos</th><th>Base (TXT)</th><th>% Adesão</th></tr></thead><tbody>`;
        setoresLista.forEach(s => {
            const resp = respondidos.filter(r => r.setor === s).length;
            const total = baseFuncionarios.filter(f => f.setor === s).length || 0;
            const perc = total > 0 ? Math.round((resp/total)*100) : 0;
            html += `<tr><td>${s}</td><td>${resp}</td><td>${total}</td><td>${perc}%</td></tr>`;
        });
        document.getElementById('tabela-quorum').innerHTML = html + "</tbody></table>";
    };

    // Importar TXT
    document.getElementById('import-txt').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => {
            baseFuncionarios = reader.result.split('\n').map(l => {
                const p = l.split(',');
                return { nome: p[0]?.trim(), setor: p[1]?.trim() };
            });
            alert("Base de funcionários carregada com sucesso!");
            window.gerarRelatorio();
        };
        reader.readAsText(e.target.files[0]);
    };

    window.switchScreen = (s) => {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('screen-'+s).classList.add('active');
        document.getElementById('nav-'+s.substring(0,5)).classList.add('active');
        if(s === 'admin') window.gerarRelatorio();
    };

    // Popular o filtro admin automaticamente
    const filterSelect = document.getElementById('filtro-setor');
    ["ADMINISTRATIVO", "PEDAGÓGICO", "ESPECIALIDADES", "NUTRIÇÃO", "TI", "COMUNICAÇÃO", "INFRAESTRUTURA", "SISTEMA INTEGRAL", "RECURSOS HUMANOS", "DEPARTAMENTO PESSOAL", "EVENTOS", "ENFERMAGEM", "DIRETORIA"].forEach(s => {
        filterSelect.innerHTML += `<option value="${s}">${s}</option>`;
    });
</script>
</body>
</html>
